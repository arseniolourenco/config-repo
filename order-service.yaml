spring:
  application:
    name: ${ORDER_SERVICE_NAME:order-service}

  datasource:
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME_POSTGRES:org.postgresql.Driver}
    url: ${SPRING_DATASOURCE_URL_POSTGRES:jdbc:postgresql://postgres:5432/orderDB}
    username: ${SPRING_DATASOURCE_USERNAME_POSTGRES:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD_POSTGRES:postgres}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO_POSTGRES:none}
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT_POSTGRES:org.hibernate.dialect.PostgreSQLDialect}
        # format_sql: true
    # show-sql: true

  kafka:
    bootstrap-servers: kafka:29092
    template:
      default-topic: order-events
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # observation-enabled: true

server:
  port: ${ORDER_SERVICE_PORT:8080}

# eureka:
#   client:
#     service-url:
#       defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE}
#     register-with-eureka: true
#     fetch-registry: true
#     enabled: true
#     healthcheck:
#       enabled: true
#   instance:
#     hostname: ${ORDER_SERVICE_INSTANCE_HOSTNAME}
#     instance-id: ${spring.application.name}:${server.port}
#     prefer-ip-address: true

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_TRACING_ZIPKIN_ENDPOINT}

  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

