spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/spring-boot-microservices-realm
          jwk-set-uri: http://keycloak:8080/realms/spring-boot-microservices-realm/protocol/openid-connect/certs

  cloud:
    gateway:
      observability:
        enabled: true

      # discovery:
      #   locator:
      #     enabled: true
      #     lower-case-service-id: true

      routes:
        # =============================
        # Eureka Dashboard
        # =============================
        - id: discovery-server-web
          uri: http://discovery-server:8761
          predicates:
            - Path=/eureka/web/**
          filters:
            - SetPath=/

        # =============================
        # Eureka Static Resources
        # =============================
        - id: discovery-server-static
          uri: http://discovery-server:8761
          predicates:
            - Path=/eureka/**

        # =============================
        # ORDER SERVICE
        # =============================
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/orders/**

        # =============================
        # PRODUCT SERVICE
        # =============================
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/products/**

        # =============================
        # INVENTORY SERVICE
        # =============================
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/inventory/**

        # =============================
        # USER SERVICE
        # =============================
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        # =============================
        # AUTH SERVICE
        # =============================
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        # =============================
        # SWAGGER ROUTES
        # =============================
        - id: order-service-docs
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/order-service/v3/api-docs
          filters:
            - RewritePath=/order-service/(?<path>.*), /${path}

        - id: product-service-docs
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/product-service/v3/api-docs
          filters:
            - RewritePath=/product-service/(?<path>.*), /${path}

        - id: inventory-service-docs
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/inventory-service/v3/api-docs
          filters:
            - RewritePath=/inventory-service/(?<path>.*), /${path}

        - id: user-service-docs
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user-service/v3/api-docs
          filters:
            - RewritePath=/user-service/(?<path>.*), /${path}

        - id: auth-service-docs
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth-service/v3/api-docs
          filters:
            - RewritePath=/auth-service/(?<path>.*), /${path}

server:
  port: 8080



logging:
  level:
    root: INFO
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
    org.springframework.security: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.gateway.route.RouteDefinitionLocator: INFO
    io.micrometer.tracing: INFO
    brave: INFO



springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: order-service
        url: /order-service/v3/api-docs
      - name: product-service
        url: /product-service/v3/api-docs
      - name: inventory-service
        url: /inventory-service/v3/api-docs
      - name: user-service
        url: /user-service/v3/api-docs
      - name: auth-service
        url: /auth-service/v3/api-docs
