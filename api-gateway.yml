# =========================================================
# APPLICATION
# =========================================================
spring:
  application:
    name: ${API_GATEWAY_NAME:api-gateway}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}

  cloud:
    gateway:

      # =====================================================
      # OBSERVABILITY
      # =====================================================
      observability:
        enabled: true

      # =====================================================
      # DISCOVERY LOCATOR
      # =====================================================
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # =====================================================
      # ROUTES
      # =====================================================
      routes:

        # ===================================================
        # EUREKA DASHBOARD
        # ===================================================
        - id: discovery-server-web
          uri: http://discovery-server:8761
          predicates:
            - Path=/eureka/web/**
          filters:
            - SetPath=/

        # ===================================================
        # EUREKA STATIC RESOURCES
        # ===================================================
        - id: discovery-server-static
          uri: http://discovery-server:8761
          predicates:
            - Path=/eureka/**

        # ===================================================
        # ORDER SERVICE
        # ===================================================
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/orders/**

        # ===================================================
        # PRODUCT SERVICE
        # ===================================================
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/products/**

        # ===================================================
        # INVENTORY SERVICE
        # ===================================================
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/inventory/**

server:
  port: ${API_GATEWAY_PORT:8080}

# =========================================================
# EUREKA CLIENT
# =========================================================
eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true

    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE}

  instance:
    hostname: ${API_GATEWAY_INSTANCE_HOSTNAME}
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true

# =========================================================
# ACTUATOR / OBSERVABILITY
# =========================================================
management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  tracing:
    enabled: true
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_TRACING_ZIPKIN_ENDPOINT}

  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

# =========================================================
# SWAGGER / OPENAPI
# =========================================================
springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    enabled: true
    path: /swagger-ui.html

    urls:
      - name: order-service
        url: /order-service/v3/api-docs

      - name: product-service
        url: /product-service/v3/api-docs

      - name: inventory-service
        url: /inventory-service/v3/api-docs

# =========================================================
# LOGGING
# =========================================================
logging:
  level:
    root: INFO

    com.netflix.eureka: INFO
    com.netflix.discovery: INFO

    org.springframework.security: INFO

    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.gateway.route.RouteDefinitionLocator: INFO

    io.micrometer.tracing: INFO
    brave: INFO

  pattern:
    level: "%5p [${spring.application.name}, %X{traceId:-}, %X{spanId:-}]"